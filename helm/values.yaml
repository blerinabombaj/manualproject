namespace: todo-app

frontend:
  image:
    repository: digdigdigdig/manualproject-frontend
    tag: 0705a56c440def32ba5a8daa802d8ffb7da28cae
  replicas: 1
  port: 80

backend:
  image:
    repository: digdigdigdig/manualproject-backend
    tag: 0705a56c440def32ba5a8daa802d8ffb7da28cae
  replicas: 1
  port: 5000

postgres:
  image:
    repository: postgres
    tag: 15
  replicas: 1
  port: 5432
  database: todos
  user: postgres

secret:
  password: password

ingress:
  className: nginx
  frontendPath: /
  backendPath: /tasks

rbac:
  devUser: dev-user
  adminUser: admin-user

backup:
  serviceAccount:
    name: backup-service-account
    roleArn: arn:aws:iam::444062204470:role/todo-app-s3-backup-role
  cronJob:
    name: s3-backup
    schedule: "*/5 * * * *"
  s3:
    bucket: todo-app-backup-rl