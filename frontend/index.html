<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>DevOps Todo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f4f4f5; min-height: 100vh; display: flex; justify-content: center; padding: 40px 16px; }
    .container { width: 100%; max-width: 520px; }
    h1 { font-size: 1.6rem; margin-bottom: 24px; color: #18181b; }
    .add-row { display: flex; gap: 8px; margin-bottom: 24px; }
    input { flex: 1; padding: 10px 14px; border: 1px solid #d4d4d8; border-radius: 8px; font-size: 1rem; outline: none; }
    input:focus { border-color: #6366f1; }
    button.add { padding: 10px 18px; background: #6366f1; color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; }
    button.add:hover { background: #4f46e5; }
    .task { display: flex; align-items: center; gap: 12px; background: white; border: 1px solid #e4e4e7; border-radius: 8px; padding: 12px 16px; margin-bottom: 8px; }
    .task input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: #6366f1; }
    .task span { font-size: 1rem; color: #3f3f46; flex: 1; }
    .task span.done { text-decoration: line-through; color: #a1a1aa; }
    .status { font-size: 0.85rem; color: #71717a; margin-bottom: 12px; }
    .error { color: #ef4444; font-size: 0.85rem; margin-bottom: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📋 Todo App</h1>
    <div class="add-row">
      <input id="taskInput" type="text" placeholder="Add a new task..." />
      <button class="add" onclick="addTask()">Add</button>
    </div>
    <div id="error" class="error" style="display:none"></div>
    <div id="status" class="status">Loading tasks...</div>
    <div id="taskList"></div>
  </div>

  <script>
    const API = window.API_URL || "http://localhost:5001";

    async function loadTasks() {
      try {
        const res = await fetch(`${API}/tasks`);
        const tasks = await res.json();
        document.getElementById("status").textContent = `${tasks.length} task(s)`;
        document.getElementById("taskList").innerHTML = tasks.map(t => `
          <div class="task">
            <input type="checkbox" ${t.done ? "checked" : ""} onchange="toggleTask(${t.id}, this.checked)" />
            <span class="${t.done ? 'done' : ''}">${t.title}</span>
          </div>
        `).join("");
      } catch (e) {
        document.getElementById("status").textContent = "Could not connect to backend.";
      }
    }

    async function addTask() {
      const input = document.getElementById("taskInput");
      const title = input.value.trim();
      if (!title) return;
      try {
        await fetch(`${API}/tasks`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ title })
        });
        input.value = "";
        loadTasks();
      } catch (e) {
        document.getElementById("error").style.display = "block";
        document.getElementById("error").textContent = "Failed to add task.";
      }
    }

    async function toggleTask(id, done) {
      await fetch(`${API}/tasks/${id}`, {
        method: "PATCH",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ done })
      });
      loadTasks();
    }

    document.getElementById("taskInput").addEventListener("keydown", e => {
      if (e.key === "Enter") addTask();
    });

    loadTasks();
  </script>
</body>
</html>
