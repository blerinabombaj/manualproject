name: CI/CD - Build and Push

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - 'backend/**'
      - 'helm/templates/**'
      - 'helm/Chart.yaml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest  
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: frontend/
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/manualproject-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/manualproject-frontend:${{ github.sha }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: backend/
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/manualproject-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/manualproject-backend:${{ github.sha }}


      - name: Update image tags in values.yaml
        run: |
           sed -i "/frontend:/,/tag:/ s|tag:.*|tag: ${{ github.sha }}|" helm/values.yaml
           sed -i "/backend:/,/tag:/ s|tag:.*|tag: ${{ github.sha }}|" helm/values.yaml
           git config user.email "ci@github.com"
           git config user.name "GitHub Actions"
           git add helm/values.yaml
           git commit -m "ci: update image tags to ${{ github.sha }}"
           git push