name: CI/CD - Build and Push

on:
  push:
    branches: 
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest  
    permissions:
      contents: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Frontend
        uses: docker/build-push-action@v4
        with:
          context: frontend/
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/manualproject-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/manualproject-frontend:${{ github.sha }}

      - name: Build and Push Backend
        uses: docker/build-push-action@v4
        with:
          context: backend/
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/manualproject-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/manualproject-backend:${{ github.sha }}


      - name: Update image tags via Helm
        run: |
          helm upgrade --install todo-app ./todo-app \
            --set frontend.image.tag=${{ github.sha }} \
            --set backend.image.tag=${{ github.sha }}