apiVersion: apps/v1
kind: Deployment
metadata:
  namespace: todo-app
  name: frontend-deployment
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: digdigdigdig/manualproject-frontend:5648f1ed7daf15da983431873e2ff6cec0017fee
        ports:
        - containerPort: 80
